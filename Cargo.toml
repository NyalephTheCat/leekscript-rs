[package]
name = "leekscript-rs"
version = "0.1.0"
edition = "2021"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"

[[bin]]
name = "leekscript"
path = "src/main.rs"

[features]
default = []
transform = ["sipha/transform"]

[dependencies]
clap = { version = "4", features = ["derive"] }
miette = { version = "7", features = ["fancy"] }
serde_json = "1"
sipha = { path = "../sipha/sipha", features = ["miette", "emit"] }

[dev-dependencies]
sipha-diff = { path = "../sipha/sipha-diff" }
